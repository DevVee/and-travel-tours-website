<!doctype html>
<html lang="en-PH">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" sizes="192x192" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <meta name="theme-color" content="#F97316" />
    <meta name="msapplication-TileColor" content="#F97316" />

    <!-- ═══ VIEWPORT ═════════════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ═══ PRIMARY SEO ══════════════════════════════════════════════ -->
    <title>A N D Travel and Tours | Travel Agency Bacoor Cavite | Japan Korea Europe Tour Packages</title>
    <meta name="description" content="A N D Travel and Tours – DTI & BIR registered travel agency in Bacoor, Cavite, Philippines. Affordable tour packages to Japan, South Korea, Europe, Dubai, Singapore, Thailand & more. Airline ticketing, hotel reservations, visa assistance. Call 09159234547." />
    <meta name="keywords" content="travel agency Bacoor Cavite, travel agency Philippines, tour packages Japan Korea, Europe tour Philippines, Dubai tour package, Singapore tour, Thailand tour, visa assistance Philippines, airline ticketing Cavite, hotel reservation Philippines, affordable tour packages Cavite, A N D Travel and Tours, group tour Philippines, corporate travel Cavite" />
    <meta name="author" content="A N D Travel and Tours" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://andtravelandtours.com" />

    <!-- ═══ GEO / LOCAL SEO ══════════════════════════════════════════ -->
    <meta name="geo.region" content="PH-CAV" />
    <meta name="geo.placename" content="Bacoor, Cavite, Philippines" />
    <meta name="geo.position" content="14.4096576;120.993401" />
    <meta name="ICBM" content="14.4096576, 120.993401" />

    <!-- ═══ OPEN GRAPH (Facebook / Social Sharing) ═══════════════════ -->
    <meta property="og:type" content="business.business" />
    <meta property="og:title" content="A N D Travel and Tours | Travel Agency Bacoor Cavite" />
    <meta property="og:description" content="DTI & BIR registered travel agency in Bacoor, Cavite. Affordable tour packages to Japan, Korea, Europe, Dubai & more. Visa assistance, airline ticketing, hotel reservations." />
    <!--
      TODO: Replace /logo.png with a purpose-built 1200×630 OG banner image
      that shows the brand + a travel photo for better social sharing previews.
      Until then, og:image:width / og:image:height are omitted to avoid claiming
      incorrect dimensions (the logo is not 1200×630).
    -->
    <meta property="og:image" content="https://andtravelandtours.com/logo.png" />
    <meta property="og:url" content="https://andtravelandtours.com" />
    <meta property="og:site_name" content="A N D Travel and Tours" />
    <meta property="og:locale" content="en_PH" />
    <meta property="business:contact_data:street_address" content="Blk 10 Lot 6, Danarose Residences" />
    <meta property="business:contact_data:locality" content="Bacoor" />
    <meta property="business:contact_data:region" content="Cavite" />
    <meta property="business:contact_data:country_name" content="Philippines" />
    <meta property="business:contact_data:phone_number" content="+639159234547" />
    <meta property="business:contact_data:email" content="A.travelandtours@gmail.com" />

    <!-- ═══ TWITTER CARD (FIX L-02) ══════════════════════════════════
         Required for rich previews when the URL is shared on Twitter/X.
    ════════════════════════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A N D Travel and Tours | Travel Agency Bacoor Cavite" />
    <meta name="twitter:description" content="DTI & BIR registered travel agency in Bacoor, Cavite. Affordable tour packages to Japan, Korea, Europe, Dubai & more. Visa assistance, airline ticketing, hotel reservations." />
    <meta name="twitter:image" content="https://andtravelandtours.com/logo.png" />

    <!-- ═══ SECURITY (meta layer — HTTP headers in vercel.json are primary) ══ -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ═══ PERFORMANCE ═══════════════════════════════════════════════
         FIX M-09: Google Fonts removed. Fonts are now self-hosted via
         @fontsource (imported in src/main.tsx), eliminating:
           – External DNS lookups on every visit
           – Render-blocking third-party CSS
           – Google IP-logging of site visitors

         FIX M-06: Preload the first hero slide image so the browser starts
         fetching it immediately — before JS executes — improving LCP.
         This is the Largest Contentful Paint element on the page.
    ════════════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1600&q=90&auto=format&fit=crop"
      fetchpriority="high"
    />

    <!-- ═══ JSON-LD STRUCTURED DATA ═══════════════════════════════════
         FIX M-08: Removed fabricated aggregateRating (ratingValue:"5",
         reviewCount:"5000"). Google's guidelines require aggregate ratings
         to reflect real, verifiable reviews — hardcoded data risks a manual
         penalty. Remove or restore only when backed by a real review platform.
    ════════════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">

          "telephone": "+639159234547",
          "email": "A.travelandtours@gmail.com",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Blk 10 Lot 6, Danarose Residences",
            "addressLocality": "Bacoor",
            "addressRegion": "Cavite",
            "postalCode": "4102",
            "addressCountry": "PH"
          },
          "geo": {
            "@type": "GeoCoordinates",
            "latitude": 14.4096576,
            "longitude": 120.993401
          },
          "openingHoursSpecification": [
            {
              "@type": "OpeningHoursSpecification",
              "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
              "opens": "08:00",
              "closes": "20:00"
            }
          ],
          "sameAs": [
            "https://www.facebook.com/profile.php?id=61590018405492"
          ],
          "priceRange": "₱₱",
          "currenciesAccepted": "PHP",
          "paymentAccepted": "Cash, GCash, Bank Transfer",
          "areaServed": [
            {
              "@type": "Country",
              "name": "Philippines"
            }
          ],
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Travel Services",
            "itemListElement": [

              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "International Tour Packages" } },

        {

          "publisher": { "@id": "https://andtravelandtours.com/#business" },

        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home",         "item": "https://andtravelandtours.com" },
